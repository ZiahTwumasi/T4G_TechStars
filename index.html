<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment Dashboard TechStars</title>

    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/f69ff6b3b4.js" crossorigin="anonymous"></script>
</head>

<body>
    <header>
       <div class="logo">Assessment</div>
    </header>

    <main class="container">

        <h2>Soft Skills</h2>
        <div class="skills-group">

            <div class="card purple">
                <h3>Critical Thinking</h3>
                <p>85%</p>
            </div>

            <div class="card blue">
                <h3>Entrepreneurship</h3>
                <p>90%</p>
            </div>

            <div class="card green">
                <h3>Public Speaking</h3>
                <p>-</p>
            </div>

            <div class="card orange">
                <h3>Problem Solving</h3>
                <p>87%</p>
            </div>

        </div>

        <h2>Technical Skills</h2>
        <div class="skills-group">

            <div class="card red">
                <h3>Figma</h3>
                <p>80%</p>
            </div>

            <div class="card yellow">
                <h3>HTML</h3>
                <p>90%</p>
            </div>

            <div class="card brown">
                <h3>CSS Styling</h3>
                <p>85%</p>
            </div>

            <div class="card grey">
                <h3>JavaScript</h3>
                <p>-</p>
            </div>

        </div>

        <h2>Course Performance</h2>
        <div class="skills-group">

             <div class="card emerald">
                <h3>Mini Project</h3>
                <p>75%</p>
            </div>

            <div class="card pink">
                <h3>Assignments</h3>
                <p>5/10</p>
            </div>

            <div class="card lilac">
                <h3>Main Project</h3>
                <p>47%</p>
            </div>

            <div class="card teal">
                <h3>Progress</h3>
                <p>54%</p>
            </div>

        </div>

    </main>

</body>
</html>
